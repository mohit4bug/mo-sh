services:
  postgres:
    container_name: mo-sh-postgres
    image: postgres:latest
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    restart: always
  redis:
    image: redis:latest
    container_name: mo-sh-redis-server
    ports:
      - "6379:6379"
    restart: always
